<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tapperuse">
<meta name="theme-color" content="#0A0E27">
<title>Tapperuse 2.0</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; background: #0A0E27; color: #E8ECF4; overscroll-behavior: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  ::-webkit-scrollbar { width: 0; display: none; }
  button { font-family: inherit; }
  input { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  bg: "#0A0E27", card: "#111838", accent: "#00D4AA", accentDim: "rgba(0,212,170,0.15)",
  accentGlow: "rgba(0,212,170,0.3)", red: "#FF4757", redDim: "rgba(255,71,87,0.15)",
  orange: "#FFA502", white: "#FFFFFF", t1: "#E8ECF4", t2: "#7B8DB5", t3: "#4A5578",
  border: "#1E2A4A", surface: "#0D1230",
};

const SAUNAS = [
  { id:1, name:"Thermen Soesterberg", loc:"Soesterberg", dist:"12 km", rating:4.7, img:"🧖", open:"10:00 - 23:00", rate:0.06, max:28, occ:"rustig",
    amenities:["Finse sauna","Stoombad","Buitenbad","Horeca"],
    rates:[{t:"10-12",r:0.04,l:"Ochtend"},{t:"12-16",r:0.06,l:"Middag"},{t:"16-19",r:0.10,l:"Piek"},{t:"19-23",r:0.08,l:"Avond"}] },
  { id:2, name:"Sauna Amerena", loc:"Amersfoort", dist:"3 km", rating:4.5, img:"♨️", open:"09:00 - 23:00", rate:0.04, max:25, occ:"zeer rustig",
    amenities:["Infrarood","Finse sauna","IJsbad","Tuin"],
    rates:[{t:"09-12",r:0.04,l:"Ochtend"},{t:"12-16",r:0.06,l:"Middag"},{t:"16-19",r:0.10,l:"Piek"},{t:"19-23",r:0.07,l:"Avond"}] },
  { id:3, name:"Spa Zuiver", loc:"Baarn", dist:"18 km", rating:4.8, img:"💎", open:"10:00 - 22:00", rate:0.08, max:32, occ:"normaal",
    amenities:["Hamam","Buitensauna","Zwembad","Restaurant"],
    rates:[{t:"10-13",r:0.05,l:"Ochtend"},{t:"13-17",r:0.08,l:"Middag"},{t:"17-20",r:0.14,l:"Piek"},{t:"20-22",r:0.10,l:"Avond"}] },
  { id:4, name:"Wellness de Witte Bergen", loc:"Eemnes", dist:"15 km", rating:4.6, img:"🌿", open:"10:00 - 22:30", rate:0.05, max:27.5, occ:"rustig",
    amenities:["Bos-sauna","Jacuzzi","Rustruimte","Bistro"],
    rates:[{t:"10-13",r:0.04,l:"Ochtend"},{t:"13-17",r:0.05,l:"Middag"},{t:"17-20",r:0.11,l:"Piek"},{t:"20-22:30",r:0.07,l:"Avond"}] },
];

const fmt = n => `€${n.toFixed(2).replace(".",",")}`;
const fmtTime = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`; };

const Badge = ({level}) => {
  const m = {"zeer rustig":{c:C.accent,b:C.accentDim}, rustig:{c:C.accent,b:C.accentDim}, normaal:{c:C.orange,b:"rgba(255,165,2,0.15)"}, druk:{c:C.red,b:C.redDim}};
  const x = m[level]||m.normaal;
  return <span style={{background:x.b,color:x.c,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600}}>◉ {level}</span>;
};

const RateBar = ({rate,active,label,time,maxR}) => {
  const h = Math.max(20,(rate/maxR)*100);
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flex:1}}>
    <span style={{fontSize:11,fontWeight:700,color:active?C.accent:C.t2}}>€{rate.toFixed(2).replace(".",",")}</span>
    <div style={{width:"100%",maxWidth:48,height:72,background:C.surface,borderRadius:6,display:"flex",alignItems:"flex-end",overflow:"hidden",border:active?`2px solid ${C.accent}`:`1px solid ${C.border}`}}>
      <div style={{width:"100%",height:`${h}%`,borderRadius:4,background:active?`linear-gradient(180deg,${C.accent},rgba(0,212,170,0.4))`:`linear-gradient(180deg,${C.t3},rgba(74,85,120,0.3))`,transition:"height 0.5s"}} />
    </div>
    <span style={{fontSize:10,color:active?C.accent:C.t3,fontWeight:active?700:400}}>{label}</span>
    <span style={{fontSize:9,color:C.t3}}>{time}</span>
  </div>;
};

// ====== SPLASH ======
const Splash = ({go}) => <div style={{height:"100%",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",background:`radial-gradient(ellipse at 50% 30%,rgba(0,212,170,0.08) 0%,transparent 70%)`,padding:40,textAlign:"center",animation:"fadeIn 0.6s ease"}}>
  <div style={{fontSize:52,marginBottom:8}}>⏱</div>
  <h1 style={{fontSize:34,fontWeight:800,color:C.white,letterSpacing:-1}}>tapper<span style={{color:C.accent}}>use</span></h1>
  <p style={{color:C.t2,fontSize:15,margin:"12px 0 36px",lineHeight:1.5}}>Betaal per minuut.<br/>Geniet per seconde.</p>
  <button onClick={go} style={{background:`linear-gradient(135deg,${C.accent},#00B894)`,color:C.bg,border:"none",borderRadius:14,padding:"16px 48px",fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:`0 8px 32px ${C.accentGlow}`}}>Ontdek sauna's</button>
  <p style={{color:C.t3,fontSize:11,marginTop:28}}>PROTOTYPE • TAPPERUSE 2.0</p>
</div>;

// ====== LIST ======
const List = ({onSelect}) => <div style={{padding:"0 16px 100px",animation:"fadeIn 0.4s ease"}}>
  <div style={{padding:"16px 0 14px"}}>
    <h2 style={{fontSize:22,fontWeight:800,color:C.white,letterSpacing:-0.5}}>Sauna's in de buurt</h2>
    <p style={{color:C.t2,fontSize:13,marginTop:3}}>Actuele tarieven • Amersfoort e.o.</p>
  </div>
  <div style={{background:C.card,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,marginBottom:14,border:`1px solid ${C.border}`}}>
    <span style={{color:C.t3}}>🔍</span><span style={{color:C.t3,fontSize:14}}>Zoek een sauna...</span>
  </div>
  <div style={{display:"flex",gap:8,marginBottom:18,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:4}}>
    {["Dichtbij","Laagste tarief","Best beoordeeld","Rustig nu"].map((f,i) =>
      <span key={f} style={{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:"nowrap",cursor:"pointer",background:i===0?C.accentDim:"transparent",color:i===0?C.accent:C.t2,border:`1px solid ${i===0?C.accent:C.border}`}}>{f}</span>
    )}
  </div>
  <div style={{display:"flex",flexDirection:"column",gap:12}}>
    {SAUNAS.map((s,si) => <div key={s.id} onClick={()=>onSelect(s)} style={{background:C.card,borderRadius:16,padding:16,cursor:"pointer",border:`1px solid ${C.border}`,animation:`fadeIn 0.4s ease ${si*0.08}s both`}}>
      <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
        <div style={{width:52,height:52,borderRadius:14,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{s.img}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div>
              <h3 style={{fontSize:15,fontWeight:700,color:C.white}}>{s.name}</h3>
              <p style={{fontSize:12,color:C.t2,marginTop:2}}>{s.loc} • {s.dist}</p>
            </div>
            <Badge level={s.occ}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10}}>
            <div><span style={{fontSize:20,fontWeight:800,color:C.accent}}>€{s.rate.toFixed(2).replace(".",",")}</span><br/><span style={{fontSize:10,color:C.t3}}>per minuut</span></div>
            <div style={{width:1,height:28,background:C.border}}/>
            <div><span style={{fontSize:14,fontWeight:600,color:C.t2}}>max {fmt(s.max)}</span><br/><span style={{fontSize:10,color:C.t3}}>maximumprijs</span></div>
            <div style={{marginLeft:"auto"}}><span style={{fontSize:12,color:C.orange}}>★ {s.rating}</span></div>
          </div>
        </div>
      </div>
    </div>)}
  </div>
</div>;

// ====== DETAIL ======
const Detail = ({s,onStart,onBack}) => {
  const [p,setP] = useState(1);
  const aIdx = 1; // simulate middag
  const maxR = Math.max(...s.rates.map(r=>r.r));
  return <div style={{padding:"0 16px 24px",animation:"fadeIn 0.3s ease"}}>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 0"}}>
      <button onClick={onBack} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,cursor:"pointer",fontSize:16}}>←</button>
      <div><h2 style={{fontSize:19,fontWeight:800,color:C.white}}>{s.name}</h2><p style={{fontSize:12,color:C.t2}}>{s.loc} • {s.open}</p></div>
    </div>
    <div style={{background:`linear-gradient(135deg,rgba(0,212,170,0.12) 0%,rgba(0,212,170,0.03) 100%)`,borderRadius:20,padding:22,border:`1px solid rgba(0,212,170,0.2)`,marginBottom:14,textAlign:"center",animation:"scaleIn 0.4s ease"}}>
      <p style={{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Actueel tarief</p>
      <div style={{fontSize:46,fontWeight:800,color:C.accent,lineHeight:1}}>€{s.rate.toFixed(2).replace(".",",")}</div>
      <p style={{fontSize:14,color:C.t2,marginTop:4}}>per minuut</p>
      <div style={{marginTop:14,display:"flex",justifyContent:"center",gap:24}}>
        <div><p style={{fontSize:19,fontWeight:700,color:C.white}}>{fmt(s.max)}</p><p style={{fontSize:11,color:C.t3}}>maximumprijs</p></div>
        <div style={{width:1,background:C.border}}/>
        <div><Badge level={s.occ}/><p style={{fontSize:11,color:C.t3,marginTop:4}}>bezetting nu</p></div>
      </div>
    </div>
    <div style={{background:C.card,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginBottom:14}}>
      <h3 style={{fontSize:14,fontWeight:700,color:C.white,marginBottom:14}}>Tarieven vandaag</h3>
      <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>
        {s.rates.map((r,i) => <RateBar key={i} rate={r.r} active={i===aIdx} label={r.l} time={r.t} maxR={maxR}/>)}
      </div>
    </div>
    <div style={{background:C.card,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginBottom:14}}>
      <h3 style={{fontSize:14,fontWeight:700,color:C.white,marginBottom:10}}>Wat kost het je?</h3>
      <div style={{display:"flex",justifyContent:"space-between",gap:6}}>
        {[{d:"1 uur",c:s.rate*60},{d:"2 uur",c:s.rate*120},{d:"3 uur",c:Math.min(s.rate*180,s.max)},{d:"4+ uur",c:s.max}].map(e =>
          <div key={e.d} style={{flex:1,textAlign:"center",padding:"10px 2px",background:C.surface,borderRadius:10}}>
            <p style={{fontSize:15,fontWeight:700,color:C.accent}}>{fmt(e.c)}</p>
            <p style={{fontSize:11,color:C.t3,marginTop:2}}>{e.d}</p>
          </div>
        )}
      </div>
      <p style={{fontSize:11,color:C.t3,marginTop:10,textAlign:"center"}}>Regulier dagticket: <span style={{textDecoration:"line-through"}}>{fmt(s.max+4.5)}</span></p>
    </div>
    <div style={{background:C.card,borderRadius:16,padding:"12px 18px",border:`1px solid ${C.border}`,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:14,fontWeight:600,color:C.white}}>Aantal personen</span>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <button onClick={()=>setP(Math.max(1,p-1))} style={{width:34,height:34,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,color:C.white,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <span style={{fontSize:20,fontWeight:700,color:C.white,minWidth:24,textAlign:"center"}}>{p}</span>
        <button onClick={()=>setP(Math.min(6,p+1))} style={{width:34,height:34,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,color:C.white,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}}>
      {s.amenities.map(a => <span key={a} style={{padding:"5px 12px",borderRadius:8,fontSize:12,color:C.t2,background:C.surface,border:`1px solid ${C.border}`}}>{a}</span>)}
    </div>
    <button onClick={()=>onStart(p)} style={{width:"100%",padding:"18px 0",borderRadius:16,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${C.accent},#00B894)`,color:C.bg,fontSize:17,fontWeight:800,letterSpacing:0.5,boxShadow:`0 8px 32px ${C.accentGlow}`}}>
      Start bezoek • {p} {p===1?"persoon":"personen"}
    </button>
  </div>;
};

// ====== SESSION ======
const Session = ({s,p,onStop}) => {
  const [sec,setSec] = useState(0);
  const [qr,setQr] = useState(true);
  const ref = useRef(null);
  useEffect(()=>{ ref.current=setInterval(()=>setSec(v=>v+1),1000); const t=setTimeout(()=>setQr(false),3000); return()=>{clearInterval(ref.current);clearTimeout(t);}; },[]);
  const min=sec/60, cost=Math.min(s.rate*min*p,s.max*p), maxT=s.max*p, prog=Math.min((cost/maxT)*100,100), atMax=cost>=maxT;

  if(qr) return <div style={{height:"100%",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:32,textAlign:"center",animation:"scaleIn 0.4s ease"}}>
    <div style={{width:200,height:200,background:C.white,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 60px ${C.accentGlow}`,marginBottom:24}}>
      <div style={{width:160,height:160,display:"grid",gridTemplateColumns:"repeat(8,1fr)",gridTemplateRows:"repeat(8,1fr)",gap:2}}>
        {Array.from({length:64}).map((_,i)=><div key={i} style={{background:Math.random()>0.45?"#111":"#fff",borderRadius:1}}/>)}
      </div>
    </div>
    <h2 style={{fontSize:20,fontWeight:800,color:C.white}}>Toon bij de ingang</h2>
    <p style={{fontSize:14,color:C.t2,marginTop:8}}>Laat deze QR-code scannen</p>
    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:20}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:"pulse 1.5s infinite"}}/>
      <span style={{fontSize:13,color:C.accent,fontWeight:600}}>Wachten op scan...</span>
    </div>
  </div>;

  return <div style={{padding:"0 16px 24px",display:"flex",flexDirection:"column",height:"100%",animation:"fadeIn 0.4s ease"}}>
    <div style={{textAlign:"center",padding:"16px 0 6px"}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:8,background:atMax?C.redDim:"rgba(0,212,170,0.1)",padding:"6px 16px",borderRadius:20,marginBottom:6}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:atMax?C.red:C.accent,animation:atMax?"none":"pulse 1.5s infinite"}}/>
        <span style={{fontSize:12,fontWeight:700,color:atMax?C.red:C.accent}}>{atMax?"MAXIMUM BEREIKT":"ACTIEVE SESSIE"}</span>
      </div>
      <h2 style={{fontSize:15,fontWeight:600,color:C.t2,marginTop:2}}>{s.name}</h2>
    </div>
    <div style={{background:`radial-gradient(ellipse at 50% 40%,rgba(0,212,170,0.06) 0%,transparent 70%)`,borderRadius:24,padding:"28px 16px",textAlign:"center",marginBottom:14}}>
      <div style={{fontSize:50,fontWeight:800,color:C.white,fontVariantNumeric:"tabular-nums",letterSpacing:2}}>{fmtTime(sec)}</div>
      <p style={{fontSize:13,color:C.t3,marginTop:4}}>bezoekduur</p>
    </div>
    <div style={{background:C.card,borderRadius:20,padding:22,border:`1px solid ${C.border}`,marginBottom:14,textAlign:"center"}}>
      <p style={{fontSize:11,color:C.t3,textTransform:"uppercase",letterSpacing:1}}>Huidig bedrag</p>
      <div style={{fontSize:42,fontWeight:800,color:atMax?C.orange:C.accent,fontVariantNumeric:"tabular-nums"}}>{fmt(cost)}</div>
      <p style={{fontSize:12,color:C.t2,margin:"4px 0 14px"}}>{p} {p===1?"persoon":"personen"} × €{s.rate.toFixed(2).replace(".",",")}/min</p>
      <div style={{background:C.surface,borderRadius:8,height:8,overflow:"hidden",marginBottom:8}}>
        <div style={{height:"100%",borderRadius:8,transition:"width 1s linear",width:`${prog}%`,background:atMax?`linear-gradient(90deg,${C.orange},${C.red})`:`linear-gradient(90deg,${C.accent},#00B894)`}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:C.t3}}>€0,00</span><span style={{fontSize:11,color:C.t3}}>max {fmt(maxT)}</span></div>
    </div>
    <div style={{background:C.card,borderRadius:14,padding:"12px 18px",border:`1px solid ${C.border}`,marginBottom:20,display:"flex",justifyContent:"space-between"}}>
      <div><span style={{fontSize:11,color:C.t3}}>Tarief nu</span><p style={{fontSize:15,fontWeight:700,color:C.white,marginTop:2}}>€{s.rate.toFixed(2).replace(".",",")}/min</p></div>
      <div style={{textAlign:"right"}}><span style={{fontSize:11,color:C.t3}}>Max bereikt over</span><p style={{fontSize:15,fontWeight:700,color:C.white,marginTop:2}}>{atMax?"Nu!":`~${Math.ceil((maxT-cost)/(s.rate*p))} min`}</p></div>
    </div>
    <div style={{marginTop:"auto"}}>
      <button onClick={()=>{clearInterval(ref.current);onStop(sec,cost);}} style={{width:"100%",padding:"18px 0",borderRadius:16,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${C.red},#ee5a24)`,color:C.white,fontSize:17,fontWeight:800,boxShadow:`0 8px 32px rgba(255,71,87,0.3)`}}>⏹ Stop bezoek</button>
      <p style={{textAlign:"center",fontSize:11,color:C.t3,marginTop:8}}>Scan de QR-code bij de uitgang om te stoppen</p>
    </div>
  </div>;
};

// ====== COMPLETE ======
const Complete = ({s,p,dur,cost,onDone}) => {
  const min=Math.floor(dur/60), reg=(s.max+4.5)*p, saved=reg-cost;
  return <div style={{padding:"0 16px 24px",display:"flex",flexDirection:"column",height:"100%",animation:"fadeIn 0.4s ease"}}>
    <div style={{textAlign:"center",padding:"28px 0 14px"}}>
      <div style={{fontSize:52,marginBottom:6,animation:"scaleIn 0.5s ease"}}>✓</div>
      <h2 style={{fontSize:23,fontWeight:800,color:C.white}}>Bezoek afgerond!</h2>
      <p style={{fontSize:14,color:C.t2,marginTop:6}}>{s.name}</p>
    </div>
    <div style={{background:`linear-gradient(135deg,rgba(0,212,170,0.1) 0%,rgba(0,212,170,0.02) 100%)`,borderRadius:20,padding:22,border:`1px solid rgba(0,212,170,0.2)`,marginBottom:14,textAlign:"center"}}>
      <p style={{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Totaalbedrag</p>
      <div style={{fontSize:46,fontWeight:800,color:C.accent}}>{fmt(cost)}</div>
      <div style={{marginTop:10,display:"inline-block",background:"rgba(0,212,170,0.15)",padding:"6px 16px",borderRadius:20}}>
        <span style={{fontSize:14,fontWeight:700,color:C.accent}}>{fmt(saved)} bespaard vs. dagticket</span>
      </div>
    </div>
    <div style={{background:C.card,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginBottom:14}}>
      {[{l:"Bezoekduur",v:`${min} minuten`},{l:"Personen",v:String(p)},{l:"Tarief",v:`€${s.rate.toFixed(2).replace(".",",")}/min`},{l:"Regulier dagticket",v:fmt(reg),strike:true},{l:"Betaald via Tapperuse",v:fmt(cost),acc:true}].map((r,i) =>
        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<4?`1px solid ${C.border}`:"none"}}>
          <span style={{fontSize:14,color:C.t2}}>{r.l}</span>
          <span style={{fontSize:14,fontWeight:r.acc?700:500,color:r.acc?C.accent:r.strike?C.t3:C.white,textDecoration:r.strike?"line-through":"none"}}>{r.v}</span>
        </div>
      )}
    </div>
    <div style={{background:C.card,borderRadius:14,padding:"14px 18px",border:`1px solid ${C.border}`,marginBottom:20,display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:22}}>💳</span>
      <div><p style={{fontSize:13,fontWeight:600,color:C.white}}>Automatisch afgeschreven</p><p style={{fontSize:11,color:C.t3,marginTop:2}}>Visa •••• 4829</p></div>
    </div>
    <div style={{marginTop:"auto"}}>
      <button onClick={onDone} style={{width:"100%",padding:"18px 0",borderRadius:16,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${C.accent},#00B894)`,color:C.bg,fontSize:17,fontWeight:800,boxShadow:`0 8px 32px ${C.accentGlow}`}}>Terug naar overzicht</button>
    </div>
  </div>;
};

// ====== APP ======
function App() {
  const [scr,setScr] = useState("splash");
  const [sel,setSel] = useState(null);
  const [pers,setPers] = useState(1);
  const [sess,setSess] = useState(null);

  const goList = ()=>setScr("list");
  const goDetail = s=>{setSel(s);setScr("detail");};
  const goSession = p=>{setPers(p);setScr("session");};
  const goComplete = (d,c)=>{setSess({d,c});setScr("complete");};

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:C.bg,maxWidth:430,margin:"0 auto",position:"relative",overflow:"hidden"}}>
    {/* Status bar */}
    <div style={{padding:"env(safe-area-inset-top, 12px) 20px 6px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,minHeight:44}}>
      <span style={{fontSize:14,fontWeight:700,color:C.white}}>14:23</span>
      <div style={{display:"flex",gap:6}}><span style={{fontSize:11,color:C.t2}}>5G</span><span style={{fontSize:11,color:C.t2}}>🔋</span></div>
    </div>
    {/* App header */}
    {(scr==="list"||scr==="detail") && <div style={{padding:"2px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:18}}>⏱</span>
        <span style={{fontSize:16,fontWeight:800,color:C.white}}>tapper<span style={{color:C.accent}}>use</span></span>
      </div>
      <div style={{width:32,height:32,borderRadius:10,background:C.card,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>👤</div>
    </div>}
    {/* Content */}
    <div style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch"}}>
      {scr==="splash" && <Splash go={goList}/>}
      {scr==="list" && <List onSelect={goDetail}/>}
      {scr==="detail" && sel && <Detail s={sel} onStart={goSession} onBack={goList}/>}
      {scr==="session" && sel && <Session s={sel} p={pers} onStop={goComplete}/>}
      {scr==="complete" && sel && sess && <Complete s={sel} p={pers} dur={sess.d} cost={sess.c} onDone={goList}/>}
    </div>
    {/* Bottom nav */}
    {scr==="list" && <div style={{padding:"10px 24px calc(env(safe-area-inset-bottom, 8px) + 10px)",display:"flex",justifyContent:"space-around",borderTop:`1px solid ${C.border}`,flexShrink:0,background:C.bg}}>
      {[{i:"🔍",l:"Ontdek",a:true},{i:"❤️",l:"Favorieten",a:false},{i:"🕐",l:"Geschiedenis",a:false},{i:"⚙️",l:"Profiel",a:false}].map(t =>
        <div key={t.l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}}>
          <span style={{fontSize:18}}>{t.i}</span>
          <span style={{fontSize:10,fontWeight:t.a?700:400,color:t.a?C.accent:C.t3}}>{t.l}</span>
        </div>
      )}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
